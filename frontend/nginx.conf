# =============================================================================
# Frontend — Nginx (producao)
#
# - Serve os ficheiros estaticos do build em /usr/share/nginx/html.
# - Tem fallback SPA: qualquer rota desconhecida cai em /index.html.
# - Faz proxy de /api/* para http://backend:8000/api/v1/* (rede Docker
#   "music_ai_network"), reproduzindo o que o vite.config.ts faz em dev.
#   Resultado: o browser ve tudo na mesma origin (porta 5173) e nao ha
#   sequer dance de CORS.
# =============================================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 60MB para upload de audio (backend limita a 50MB; deixamos folga)
    client_max_body_size 60m;

    # Cache agressivo para assets versionados pelo Vite (hash no nome)
    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|svg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy para o backend FastAPI:
    #   browser    -> /api/projects
    #   nginx      -> http://backend:8000/api/v1/projects
    location /api/ {
        # Reescrita 1:1 com o que o Vite faz no dev (vite.config.ts).
        rewrite ^/api/(.*)$ /api/v1/$1 break;

        proxy_pass http://backend:8000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streaming endpoints (futuros SSE/long polling) sem buffer
        proxy_buffering off;

        # Operacoes de audio podem demorar (ajuste BPM, separacao de tracks)
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # SPA fallback: react-router gere as rotas no cliente
    location / {
        try_files $uri $uri/ /index.html;
    }

    # health check util para o compose / orchestrador
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
