version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: music_ai_db
    environment:
      POSTGRES_USER: ${DB_USER:-music_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-music_password}
      POSTGRES_DB: ${DB_NAME:-music_ai_db}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./SQL/01_init_schema.sql:/docker-entrypoint-initdb.d/01_init_schema.sql
      - ./SQL/02_create_tables.sql:/docker-entrypoint-initdb.d/02_create_tables.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-music_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - music_ai_network

  # Redis for Celery tasks (optional, for async processing)
  redis:
    image: redis:7-alpine
    container_name: music_ai_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - music_ai_network

  # Backend API
  backend:
    build:
      context: ..             # Alterado: aponta para a raiz do projeto (AI-Music-Producer-Assistent)
      dockerfile: docker/Dockerfile # Indica onde está o Dockerfile a partir da raiz
    container_name: music_ai_backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-music_user}:${DB_PASSWORD:-music_password}@postgres:5432/${DB_NAME:-music_ai_db}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      GENERATIONS_AUDIO_DIR: /app/worker/generations/audio
      GENERATIONS_PARTITURA_DIR: /app/worker/generations/partitura
      GENERATIONS_TABLATURA_DIR: /app/worker/generations/tablatura
    volumes:
      - ../backend:/app       # Alterado: Mapeia a pasta backend para o /app do container
      - ../generations:/app/generations
    # Alterado: Como o main.py está agora diretamente em /app, o comando mantém-se:
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    networks:
      - music_ai_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-music_user}:${DB_PASSWORD:-music_password}@postgres:5432/${DB_NAME:-music_ai_db}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      GENERATIONS_AUDIO_DIR: /app/worker/generations/audio
      GENERATIONS_PARTITURA_DIR: /app/worker/generations/partitura
      GENERATIONS_TABLATURA_DIR: /app/worker/generations/tablatura
    volumes:
      - ../backend:/app
      - ../generations:/app/generations
    command: celery -A worker.celery_app:celery_app worker --pool=solo --loglevel=info
    networks:
      - music_ai_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 4

  # Optional: pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: music_ai_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - music_ai_network

volumes:
  postgres_data:
  redis_data:

networks:
  music_ai_network:
    driver: bridge
